server {
    listen 8080;
    server_name casadochapeucaparao.com www.casadochapeucaparao.com;

    root /usr/share/nginx/html;
    index index.html;

    # Ocultar versão do nginx
    server_tokens off;

    # Rate limiting / proteção DoS ficam a cargo do Traefik (camada de borda),
    # que já roda na frente no Dokploy. As diretivas limit_req_zone/limit_conn_zone
    # só são válidas no contexto http{}, não aqui em conf.d/ (server{}).

    # Compressão (imagens WebP/fontes woff2 já são comprimidas — não incluir)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types
        text/css
        text/plain
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml;

    # ---- Cabeçalhos de segurança ----
    # CSP: permite recursos do próprio domínio + inline de estilo (temas) + JSON-LD inline
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'sha256-VubpLSaNvRpXhjl3kzBdNiX2sXvkrYAPZjtapqMq9NQ='; "
        "style-src 'self' 'unsafe-inline'; "
        "img-src 'self' data:; "
        "font-src 'self'; "
        "connect-src 'self'; "
        "frame-src https://www.google.com; "
        "frame-ancestors 'self'; "
        "base-uri 'self'; "
        "form-action 'self';"
        always;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Download-Options "noopen" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Assets versionados por nome de arquivo: cache de 1 ano
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # HTML e metadados sempre revalidados
    location ~* \.(html|xml|txt|webmanifest)$ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Endpoint de saúde para o healthcheck do container
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
