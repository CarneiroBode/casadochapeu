server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão (imagens WebP/fontes woff2 já são comprimidas — não incluir)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types
        text/css
        text/plain
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml;

    # Cabeçalhos de segurança (TLS/HSTS ficam a cargo do Traefik)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Assets versionados por nome de arquivo: cache de 1 ano
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # HTML e metadados sempre revalidados
    location ~* \.(html|xml|txt|webmanifest)$ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Endpoint de saúde para o healthcheck do container
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
